<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位详情</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f7; color:#1d1d1f; font-family:-apple-system,BlinkMacSystemFont,sans-serif; transition:background .2s,color .2s; }
html.dark body { background:#0f0f1a; color:#e0e0e0; }

.top-bar { padding:12px 20px; border-bottom:1px solid rgba(0,0,0,0.08); }
html.dark .top-bar { border-bottom-color:rgba(255,255,255,0.06); }
.back-btn { color:#4D96FF; text-decoration:none; font-size:13px; cursor:pointer; }
.back-btn:hover { text-decoration:underline; }

.main { padding:20px; max-width:860px; margin:0 auto; }

/* 头部 */
.job-header { margin-bottom:20px; }
.job-title { font-size:20px; font-weight:700; margin-bottom:8px; }
.job-company { font-size:15px; color:#888; margin-bottom:12px; }
html.dark .job-company { color:#aaa; }
.job-tags { display:flex; flex-wrap:wrap; gap:8px; }
.tag { padding:4px 12px; border-radius:16px; font-size:12px; background:rgba(0,0,0,0.05); color:#666; }
html.dark .tag { background:rgba(255,255,255,0.06); color:#aaa; }
.tag-salary { background:rgba(107,203,119,0.12); color:#6BCB77; }
.tag-city { background:rgba(77,150,255,0.12); color:#4D96FF; }

/* 操作按钮 */
.actions { display:flex; gap:10px; margin-bottom:24px; }
.btn { padding:10px 24px; border-radius:10px; font-size:13px; font-weight:500; border:none; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.btn-ai { background:rgba(255,215,0,0.12); color:#FFD700; border:1px solid rgba(255,215,0,0.2); }
.btn-ai:hover { background:rgba(255,215,0,0.25); }
.btn-ai:disabled { opacity:0.5; cursor:default; }
.btn-link { background:rgba(77,150,255,0.12); color:#4D96FF; border:1px solid rgba(77,150,255,0.2); }
.btn-link:hover { background:rgba(77,150,255,0.25); }

/* 区块 */
.section { margin-bottom:20px; }
.section-title { font-size:12px; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; font-weight:600; }
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; }
.info-item { font-size:13px; }
.info-label { color:#888; }
.info-value { color:#333; }
html.dark .info-value { color:#ccc; }
.jd-content { font-size:13px; line-height:1.8; color:#444; white-space:pre-wrap; word-break:break-word; }
html.dark .jd-content { color:#bbb; }
.no-jd { color:#999; font-style:italic; }
html.dark .no-jd { color:#555; }

/* ===== AI 分析结果 ===== */
.ai-result { display:none; margin-bottom:24px; }
.ai-result.visible { display:block; }
.ai-loading { text-align:center; padding:20px; color:#666; }
.ai-error { color:#FF6B6B; font-size:13px; padding:16px; text-align:center; }

/* 总分 */
.score-banner { display:flex; align-items:center; gap:20px; padding:20px; border-radius:12px; margin-bottom:16px; background:rgba(0,0,0,0.02); border:1px solid rgba(0,0,0,0.08); }
html.dark .score-banner { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.08); }
.score-ring { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; flex-shrink:0; }
.score-high { background:rgba(107,203,119,0.15); color:#6BCB77; border:3px solid rgba(107,203,119,0.5); }
.score-mid { background:rgba(255,193,7,0.15); color:#FFC107; border:3px solid rgba(255,193,7,0.5); }
.score-low { background:rgba(255,107,107,0.15); color:#FF6B6B; border:3px solid rgba(255,107,107,0.5); }
.score-info { flex:1; }
.score-verdict { font-size:15px; font-weight:600; margin-bottom:4px; }
.score-summary { font-size:13px; color:#999; line-height:1.5; }

/* 硬性条件对比 */
.hard-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
.hard-table th { font-size:11px; color:#666; text-align:left; padding:8px 12px; border-bottom:1px solid rgba(0,0,0,0.08); text-transform:uppercase; letter-spacing:0.5px; }
.hard-table td { font-size:13px; padding:8px 12px; border-bottom:1px solid rgba(0,0,0,0.04); }
html.dark .hard-table th { border-bottom-color:rgba(255,255,255,0.08); }
html.dark .hard-table td { border-bottom-color:rgba(255,255,255,0.04); }
.hard-table .col-dim { width:20%; color:#888; }
.hard-table .col-req { width:30%; }
.hard-table .col-me { width:30%; }
.hard-table .col-status { width:20%; text-align:center; }
.status-pass { color:#6BCB77; }
.status-fail { color:#FF6B6B; }
.status-warn { color:#FFC107; }
.status-na { color:#555; }

/* 分析卡片 */
.ai-card { background:rgba(0,0,0,0.02); border:1px solid rgba(0,0,0,0.08); border-radius:12px; padding:16px; margin-bottom:12px; }
html.dark .ai-card { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.08); }
.ai-card-title { font-size:13px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

/* 技能标签 */
.skill-list { display:flex; flex-wrap:wrap; gap:6px; }
.skill-tag { padding:3px 10px; border-radius:12px; font-size:12px; }
.skill-match { background:rgba(107,203,119,0.12); color:#6BCB77; }
.skill-miss { background:rgba(255,107,107,0.1); color:#FF6B6B; }
.skill-bonus { background:rgba(77,150,255,0.1); color:#4D96FF; }

/* 维度评分条 */
.dim-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.dim-label { width:80px; font-size:12px; color:#888; text-align:right; flex-shrink:0; }
.dim-bar { flex:1; height:6px; border-radius:3px; background:rgba(0,0,0,0.06); overflow:hidden; }
html.dark .dim-bar { background:rgba(255,255,255,0.06); }
.dim-fill { height:100%; border-radius:3px; transition:width 0.5s; }
.dim-fill-high { background:#6BCB77; }
.dim-fill-mid { background:#FFC107; }
.dim-fill-low { background:#FF6B6B; }
.dim-score { width:36px; font-size:12px; font-weight:600; text-align:right; }

.ai-text { font-size:13px; line-height:1.7; color:#444; }
html.dark .ai-text { color:#bbb; }
.ai-text li { margin-bottom:4px; }
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-btn" id="backBtn" onclick="history.back()" style="display:none">← 返回列表</a>
</div>

<div class="main">
  <div id="loading" class="ai-loading">加载中...</div>
  <div id="content" style="display:none;">
    <div class="job-header">
      <div class="job-title" id="jTitle"></div>
      <div class="job-company" id="jCompany"></div>
      <div class="job-tags" id="jTags"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ai" id="btnAction" onclick="handleAction()">🤖 AI 深度分析</button>
      <a class="btn btn-link" id="btnUrl" href="#" target="_blank">🔗 查看猎聘详情</a>
    </div>
    <div class="ai-result" id="aiResult"></div>
    <div class="section">
      <div class="section-title">基本信息</div>
      <div class="info-grid" id="jInfo"></div>
    </div>
    <div class="section">
      <div class="section-title">职位描述</div>
      <div id="jJD"></div>
    </div>
  </div>
</div>

<script>
const API = window.parent?.location?.origin || location.origin;
const jobId = location.pathname.split('/').pop();
let jobData = null;

// 只有从站内列表页跳过来时显示返回按钮（新标签页打开时 referrer 为空或来自对话页）
if (document.referrer && document.referrer.includes('/page/jobs')) {
  document.getElementById('backBtn').style.display = '';
}

async function load() {
  try {
    const resp = await fetch(`${API}/api/jobs/${jobId}`);
    if (!resp.ok) { document.getElementById('loading').textContent = '岗位不存在'; return; }
    jobData = await resp.json();
    render();
  } catch(e) { document.getElementById('loading').textContent = '加载失败: ' + e.message; }
}

function render() {
  const d = jobData;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('jTitle').textContent = d.title;
  document.getElementById('jCompany').textContent = d.company;

  const tags = [];
  if (d.salary) tags.push({text: '💰 ' + d.salary + (d.salary_months ? ' · ' + d.salary_months + '薪' : ''), cls: 'tag-salary'});
  if (d.city) tags.push({text: '📍 ' + d.city, cls: 'tag-city'});
  if (d.experience) tags.push({text: '📅 ' + d.experience, cls: ''});
  if (d.education) tags.push({text: '🎓 ' + d.education, cls: ''});
  document.getElementById('jTags').innerHTML = tags.map(t => `<span class="tag ${t.cls}">${esc(t.text)}</span>`).join('');

  if (d.url) document.getElementById('btnUrl').href = d.url;
  else document.getElementById('btnUrl').style.display = 'none';

  // 没有 JD → 显示爬取按钮，隐藏分析按钮
  const btn = document.getElementById('btnAction');
  if (!d.raw_jd) {
    btn.textContent = '📥 获取详情数据并分析';
    btn.dataset.state = 'fetch';
  } else if (d.match_detail) {
    btn.textContent = '🤖 重新分析';
    btn.dataset.state = 'reanalyze';
  } else {
    btn.textContent = '🤖 AI 深度分析';
    btn.dataset.state = 'analyze';
  }

  const infos = [
    ['行业', d.company_industry], ['规模', d.company_size],
    ['招聘者', d.recruiter_name], ['职位', d.recruiter_title],
    ['来源', d.platform], ['发现时间', (d.discovered_at||'').split('T')[0] || (d.discovered_at||'').split(' ')[0]],
  ].filter(([,v]) => v);
  document.getElementById('jInfo').innerHTML = infos.map(([l,v]) =>
    `<div class="info-item"><span class="info-label">${l}：</span><span class="info-value">${esc(v)}</span></div>`
  ).join('');

  const jdEl = document.getElementById('jJD');
  jdEl.innerHTML = d.raw_jd
    ? `<div class="jd-content">${esc(d.raw_jd)}</div>`
    : `<div class="no-jd">暂无职位描述（需要先爬取 JD）</div>`;

  // 已有分析结果 → 直接渲染
  if (d.match_detail) {
    try {
      const saved = JSON.parse(d.match_detail);
      const el = document.getElementById('aiResult');
      el.className = 'ai-result visible';
      renderAnalysis(saved);
      document.getElementById('btnAction').textContent = '🤖 重新分析';
    } catch(e) {}
  }
}

async function handleAction() {
  const btn = document.getElementById('btnAction');
  const state = btn.dataset.state;
  if (state === 'fetch') {
    await fetchDetail();
  }
  await runAI();
}

async function fetchDetail() {
  const btn = document.getElementById('btnAction');
  const el = document.getElementById('aiResult');
  btn.disabled = true; btn.textContent = '📥 获取中...';
  el.className = 'ai-result visible';
  el.innerHTML = '<div class="ai-loading">正在获取岗位详情数据...</div>';

  try {
    const resp = await fetch(`${API}/api/jobs/${jobId}/fetch-detail`, {
      method:'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({force: true})
    });
    const data = await resp.json();
    if (data.success && (data.fetched > 0 || data.skipped > 0)) {
      el.innerHTML = '<div class="ai-loading">详情获取成功，开始 AI 分析...</div>';
      const jr = await fetch(`${API}/api/jobs/${jobId}`);
      jobData = await jr.json();
      const jdEl = document.getElementById('jJD');
      jdEl.innerHTML = `<div class="jd-content">${esc(jobData.raw_jd)}</div>`;
    } else {
      el.innerHTML = `<div class="ai-error">获取失败: ${data.results?.[0]?.error || '未知错误'}</div>`;
      btn.disabled = false; btn.textContent = '📥 重试获取';
      throw new Error('fetch failed');
    }
  } catch(e) {
    if (e.message !== 'fetch failed') {
      el.innerHTML = `<div class="ai-error">获取失败: ${e.message}</div>`;
      btn.disabled = false; btn.textContent = '📥 重试获取';
    }
    throw e;
  }
}

async function runAI() {
  const btn = document.getElementById('btnAction');
  const el = document.getElementById('aiResult');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  el.className = 'ai-result visible';
  el.innerHTML = '<div class="ai-loading">AI 正在进行多维匹配分析...<br><span style="font-size:11px;color:#999;">通常需要 15-30 秒，请耐心等待</span></div>';

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);

    const resp = await fetch(`${API}/api/jobs/${jobId}/analysis`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: '{}',
      signal: controller.signal,
    });
    clearTimeout(timeout);

    const data = await resp.json();
    if (!data.ok) {
      el.innerHTML = `<div class="ai-error">分析失败: ${esc(data.error || '未知错误')}</div>`;
      btn.disabled = false; btn.textContent = '🤖 重新分析';
      return;
    }

    renderAnalysis(data.analysis);
    // 更新本地数据
    jobData.match_detail = JSON.stringify(data.analysis);
    jobData.match_score = data.analysis.overall_score;
  } catch(e) {
    if (e.name === 'AbortError') {
      el.innerHTML = '<div class="ai-error">分析超时（超过 2 分钟），请重试</div>';
    } else {
      el.innerHTML = `<div class="ai-error">分析失败: ${esc(e.message)}</div>`;
    }
  }
  btn.disabled = false; btn.textContent = '🤖 重新分析';
}

function renderAnalysis(a) {
  const el = document.getElementById('aiResult');
  const s = a.overall_score || 0;
  const cls = s >= 70 ? 'score-high' : s >= 50 ? 'score-mid' : 'score-low';
  let h = '';

  // 总分
  h += `<div class="score-banner">
    <div class="score-ring ${cls}">${s}</div>
    <div class="score-info">
      <div class="score-verdict">${esc(a.verdict || '')}</div>
      <div class="score-summary">${esc(a.summary || '')}</div>
    </div>
  </div>`;

  // 硬性条件对比
  if (a.hard_check?.length) {
    h += `<div class="ai-card"><div class="ai-card-title">📋 硬性条件对比</div>
      <table class="hard-table"><thead><tr>
        <th class="col-dim">维度</th><th class="col-req">岗位要求</th>
        <th class="col-me">我的情况</th><th class="col-status">结果</th>
      </tr></thead><tbody>`;
    a.hard_check.forEach(c => {
      const icon = {pass:'✅',fail:'❌',warn:'⚠️',na:'➖'}[c.status] || '➖';
      const stCls = 'status-' + (c.status || 'na');
      h += `<tr><td class="col-dim">${esc(c.dimension)}</td><td>${esc(c.requirement)}</td>
        <td>${esc(c.candidate)}</td><td class="col-status ${stCls}" title="${esc(c.note||'')}">${icon}</td></tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // 维度评分
  if (a.dimensions?.length) {
    h += `<div class="ai-card"><div class="ai-card-title">📊 多维评分</div>`;
    a.dimensions.forEach(d => {
      const dc = d.score >= 70 ? 'dim-fill-high' : d.score >= 50 ? 'dim-fill-mid' : 'dim-fill-low';
      h += `<div class="dim-row">
        <span class="dim-label">${esc(d.name)}</span>
        <div class="dim-bar"><div class="dim-fill ${dc}" style="width:${d.score}%"></div></div>
        <span class="dim-score">${d.score}</span>
      </div>`;
    });
    h += `</div>`;
  }

  // 技能匹配
  const sk = a.skills || {};
  if (sk.matched?.length || sk.missing?.length || sk.bonus?.length) {
    h += `<div class="ai-card"><div class="ai-card-title">🎯 技能匹配</div><div class="skill-list">`;
    (sk.matched||[]).forEach(s => { h += `<span class="skill-tag skill-match">✓ ${esc(s)}</span>`; });
    (sk.missing||[]).forEach(s => { h += `<span class="skill-tag skill-miss">✗ ${esc(s)}</span>`; });
    (sk.bonus||[]).forEach(s => { h += `<span class="skill-tag skill-bonus">★ ${esc(s)}</span>`; });
    h += `</div></div>`;
  }

  // 优势 + 差距 并排
  if (a.strengths?.length || a.gaps?.length) {
    h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">`;
    if (a.strengths?.length) {
      h += `<div class="ai-card"><div class="ai-card-title">💪 核心优势</div><ul class="ai-text">`;
      a.strengths.forEach(s => { h += `<li>${esc(s)}</li>`; });
      h += `</ul></div>`;
    }
    if (a.gaps?.length) {
      h += `<div class="ai-card"><div class="ai-card-title">📉 待补差距</div><ul class="ai-text">`;
      a.gaps.forEach(s => { h += `<li>${esc(s)}</li>`; });
      h += `</ul></div>`;
    }
    h += `</div>`;
  }

  // 建议 + 面试准备 并排
  if (a.suggestions?.length || a.interview_tips?.length) {
    h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">`;
    if (a.suggestions?.length) {
      h += `<div class="ai-card"><div class="ai-card-title">💡 行动建议</div><ul class="ai-text">`;
      a.suggestions.forEach(s => { h += `<li>${esc(s)}</li>`; });
      h += `</ul></div>`;
    }
    if (a.interview_tips?.length) {
      h += `<div class="ai-card"><div class="ai-card-title">🎤 面试准备</div><ul class="ai-text">`;
      a.interview_tips.forEach(s => { h += `<li>${esc(s)}</li>`; });
      h += `</ul></div>`;
    }
    h += `</div>`;
  }

  // 画像洞察
  if (a.profile_insights) {
    h += `<div class="ai-card"><div class="ai-card-title">🧠 画像洞察</div><div class="ai-text">${esc(a.profile_insights)}</div></div>`;
  }

  el.innerHTML = h;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// 主题跟随
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'themeChange') {
    document.documentElement.classList.toggle('dark', e.data.dark);
  }
});

load();
</script>
</body>
</html>
