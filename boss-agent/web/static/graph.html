<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位匹配</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f1a; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }

.main { padding:16px 20px; max-width:900px; margin:0 auto; }
.header { font-size:14px; color:#888; margin-bottom:16px; }

.match-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; margin-bottom:10px; cursor:pointer; transition:all 0.2s;
  position:relative; overflow:hidden;
}
.match-card:hover { border-color:rgba(255,215,0,0.3); background:rgba(255,255,255,0.05); }
.match-bar { position:absolute; top:0; left:0; height:3px; border-radius:0 0 3px 0; }
.card-summary { padding:16px 20px; display:flex; align-items:center; gap:16px; }

.match-rate {
  width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; flex-shrink:0;
}
.rate-high { background:rgba(107,203,119,0.15); color:#6BCB77; border:2px solid rgba(107,203,119,0.4); }
.rate-mid { background:rgba(255,193,7,0.15); color:#FFC107; border:2px solid rgba(255,193,7,0.4); }
.rate-low { background:rgba(255,107,107,0.15); color:#FF6B6B; border:2px solid rgba(255,107,107,0.4); }
.rate-none { background:rgba(255,255,255,0.05); color:#555; border:2px solid rgba(255,255,255,0.1); font-size:11px; }

.card-info h3 { font-size:14px; color:#e0e0e0; margin-bottom:3px; }
.card-meta { font-size:12px; color:#888; display:flex; flex-wrap:wrap; gap:10px; }

.has-jd { color:#6BCB77; font-size:11px; }
.no-jd { color:#555; font-size:11px; }

.loading { text-align:center; padding:40px; color:#555; }

/* 分页 */
.pagination { display:flex; justify-content:center; gap:8px; margin-top:16px; padding-bottom:20px; }
.pagination button {
  padding:6px 14px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03); color:#888; cursor:pointer; font-size:12px;
}
.pagination button:hover { background:rgba(255,255,255,0.08); color:#e0e0e0; }
.pagination button.active { background:rgba(0,122,255,0.15); color:#4D96FF; border-color:rgba(0,122,255,0.3); }
.pagination button:disabled { opacity:0.3; cursor:default; }
</style>
</head>
<body>

<div class="main">
  <div class="header" id="header">加载中...</div>
  <div id="list"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const API = window.parent?.location?.origin || location.origin;
let currentPage = 1;
const pageSize = 20;

async function load(page) {
  currentPage = page;
  document.getElementById('header').textContent = '加载中...';
  document.getElementById('list').innerHTML = '';
  try {
    const resp = await fetch(`${API}/api/jobs?page=${page}&size=${pageSize}`);
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('header').textContent = '加载失败: ' + e.message;
  }
}

function render(data) {
  const { jobs, total, page, total_pages } = data;
  document.getElementById('header').textContent = `共 ${total} 个岗位`;

  document.getElementById('list').innerHTML = jobs.map(m => {
    const score = m.match_score;
    const hasScore = score != null && score > 0;
    const pct = hasScore ? Math.round(score) : 0;
    const cls = !hasScore ? 'rate-none' : pct >= 70 ? 'rate-high' : pct >= 60 ? 'rate-mid' : 'rate-low';
    const barColor = !hasScore ? 'transparent' : pct >= 70 ? '#6BCB77' : pct >= 60 ? '#FFC107' : '#FF6B6B';
    const rateText = hasScore ? pct + '%' : '待计算';

    return `
      <div class="match-card" onclick="goDetail(${m.id})">
        <div class="match-bar" style="width:${hasScore ? pct : 0}%;background:${barColor}"></div>
        <div class="card-summary">
          <div class="match-rate ${cls}">${rateText}</div>
          <div style="flex:1">
            <div class="card-info">
              <h3>${esc(m.title)}</h3>
              <div class="card-meta">
                <span>🏢 ${esc(m.company)}</span>
                <span>💰 ${esc(m.salary)}</span>
                <span>📍 ${esc(m.city)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  // 分页
  const pg = document.getElementById('pagination');
  if (total_pages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button ${page<=1?'disabled':''} onclick="load(${page-1})">‹</button>`;
  for (let i = 1; i <= total_pages; i++) {
    if (i === 1 || i === total_pages || Math.abs(i - page) <= 2) {
      html += `<button class="${i===page?'active':''}" onclick="load(${i})">${i}</button>`;
    } else if (Math.abs(i - page) === 3) {
      html += `<button disabled>…</button>`;
    }
  }
  html += `<button ${page>=total_pages?'disabled':''} onclick="load(${page+1})">›</button>`;
  pg.innerHTML = html;
}

function goDetail(jobId) {
  // TODO: 跳转到岗位详情页（下一个 PR 实现）
  window.open(`/api/jobs/${jobId}`, '_blank');
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

load(1);
</script>
</body>
</html>
