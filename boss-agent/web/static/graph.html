<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5f5f7; color:#1d1d1f; font-family:-apple-system,BlinkMacSystemFont,sans-serif; transition:background .2s,color .2s; overflow:hidden; }
html.dark body { background:#0f0f1a; color:#e0e0e0; }

#graphCanvas { width:100%; height:calc(100vh - 44px); }
.graph-toolbar {
  padding:8px 20px; display:flex; gap:8px; align-items:center;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
html.dark .graph-toolbar { border-bottom-color:rgba(255,255,255,0.06); }
.graph-toolbar select, .graph-toolbar button {
  padding:6px 12px; border-radius:6px; border:1px solid rgba(0,0,0,0.1);
  background:rgba(0,0,0,0.03); color:#666; font-size:12px; cursor:pointer;
}
html.dark .graph-toolbar select, html.dark .graph-toolbar button {
  border-color:rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#ccc;
}
.graph-legend { display:flex; gap:12px; margin-left:auto; font-size:11px; color:#888; flex-wrap:wrap; }
.legend-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; vertical-align:middle; }
.graph-empty { display:flex; align-items:center; justify-content:center; height:calc(100vh - 44px); color:#888; font-size:14px; }
</style>
</head>
<body>

<div class="graph-toolbar">
  <select id="graphSource">
    <option value="user">👤 用户画像图谱</option>
    <option value="jobs">📋 岗位知识图谱</option>
  </select>
  <button onclick="loadGraph()">刷新</button>
  <div class="graph-legend" id="graphLegend"></div>
</div>
<canvas id="graphCanvas"></canvas>
<div class="graph-empty" id="graphEmpty" style="display:none;">暂无图谱数据</div>

<script>
const API = location.origin;
const TYPE_COLORS = {
  '用户':'#4D96FF','技能':'#6BCB77','目标角色':'#FFC107','城市':'#FF6B6B',
  '薪资':'#C084FC','工作经历':'#F97316','项目':'#06B6D4','求职偏好':'#EC4899',
  '岗位':'#4D96FF','公司':'#F97316','职责':'#8B5CF6','任职要求':'#EF4444',
  '行业':'#14B8A6','other':'#666'
};

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');
let nodes = [], edges = [], sim = null;
let dragNode = null, offsetX = 0, offsetY = 0;
let camX = 0, camY = 0, camScale = 1;

function resizeCanvas() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', () => { resizeCanvas(); if (nodes.length) draw(); });

async function loadGraph() {
  const src = document.getElementById('graphSource').value;
  try {
    const resp = await fetch(`${API}/api/graph/${src}`);
    const data = await resp.json();
    if (!data.nodes || !data.nodes.length) {
      canvas.style.display = 'none';
      document.getElementById('graphEmpty').style.display = 'flex';
      return;
    }
    canvas.style.display = 'block';
    document.getElementById('graphEmpty').style.display = 'none';
    initGraph(data);
  } catch(e) { console.error('图谱加载失败:', e); }
}

function initGraph(data) {
  resizeCanvas();
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const seen = new Set();
  nodes = data.nodes.filter(n => { if (seen.has(n.id)) return false; seen.add(n.id); return true; });
  edges = data.edges.filter(e => seen.has(e.source) && seen.has(e.target));
  const nodeMap = {};
  nodes.forEach((n, i) => {
    n.x = w/2 + (Math.random()-0.5)*300;
    n.y = h/2 + (Math.random()-0.5)*300;
    n.vx = 0; n.vy = 0;
    n.r = n.size || 12;
    n.color = TYPE_COLORS[n.type] || TYPE_COLORS['other'];
    nodeMap[n.id] = i;
  });
  edges.forEach(e => { e.si = nodeMap[e.source]; e.ti = nodeMap[e.target]; });

  const types = [...new Set(nodes.map(n => n.type))];
  document.getElementById('graphLegend').innerHTML = types.map(t =>
    `<span><span class="legend-dot" style="background:${TYPE_COLORS[t]||'#666'}"></span>${t}</span>`
  ).join('');

  if (sim) cancelAnimationFrame(sim);
  let alpha = 1;
  function tick() {
    if (alpha < 0.005) { draw(); return; }
    alpha *= 0.995;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        let dx = nodes[j].x-nodes[i].x, dy = nodes[j].y-nodes[i].y;
        let d = Math.sqrt(dx*dx+dy*dy)||1, f = alpha*800/(d*d);
        nodes[i].vx -= dx/d*f; nodes[i].vy -= dy/d*f;
        nodes[j].vx += dx/d*f; nodes[j].vy += dy/d*f;
      }
    }
    edges.forEach(e => {
      if (e.si==null||e.ti==null) return;
      let a=nodes[e.si], b=nodes[e.ti];
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1, f=alpha*(d-80)*0.05;
      a.vx+=dx/d*f; a.vy+=dy/d*f; b.vx-=dx/d*f; b.vy-=dy/d*f;
    });
    nodes.forEach(n => {
      n.vx+=(w/2-n.x)*alpha*0.01; n.vy+=(h/2-n.y)*alpha*0.01;
      n.vx*=0.6; n.vy*=0.6;
      if (n!==dragNode) { n.x+=n.vx; n.y+=n.vy; }
    });
    draw();
    sim = requestAnimationFrame(tick);
  }
  tick();
}

function draw() {
  const w=canvas.clientWidth, h=canvas.clientHeight;
  ctx.clearRect(0,0,w,h); ctx.save();
  ctx.translate(camX,camY); ctx.scale(camScale,camScale);
  const dark = document.documentElement.classList.contains('dark');
  ctx.lineWidth=0.5;
  edges.forEach(e => {
    if (e.si==null||e.ti==null) return;
    let a=nodes[e.si], b=nodes[e.ti];
    ctx.strokeStyle = dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)';
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  });
  nodes.forEach(n => {
    ctx.fillStyle=n.color; ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.fillStyle=dark?'#e0e0e0':'#333';
    ctx.font='10px sans-serif'; ctx.textAlign='center';
    ctx.fillText(n.label, n.x, n.y+n.r+12);
  });
  ctx.restore();
}

canvas.addEventListener('mousedown', e => {
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left-camX)/camScale, my=(e.clientY-rect.top-camY)/camScale;
  dragNode = nodes.find(n => Math.hypot(n.x-mx,n.y-my)<n.r+5)||null;
  if (dragNode) { offsetX=mx-dragNode.x; offsetY=my-dragNode.y; }
});
canvas.addEventListener('mousemove', e => {
  if (!dragNode) return;
  const rect=canvas.getBoundingClientRect();
  dragNode.x=(e.clientX-rect.left-camX)/camScale-offsetX;
  dragNode.y=(e.clientY-rect.top-camY)/camScale-offsetY;
  draw();
});
canvas.addEventListener('mouseup', () => { dragNode=null; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1, rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  camX=mx-(mx-camX)*d; camY=my-(my-camY)*d; camScale*=d; draw();
}, {passive:false});

window.addEventListener('message', e => {
  if (e.data?.type==='themeChange') {
    document.documentElement.classList.toggle('dark', e.data.dark);
    if (nodes.length) draw();
  }
});

loadGraph();
</script>
</body>
</html>
