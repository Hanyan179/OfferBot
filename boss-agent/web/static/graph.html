<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位匹配</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f0f1a; color:#e0e0e0; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }

.main { padding:16px 20px; max-width:900px; margin:0 auto; }
.header { font-size:14px; color:#888; margin-bottom:16px; }

.match-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08);
  border-radius:12px; margin-bottom:10px; cursor:pointer; transition:all 0.2s;
  position:relative; overflow:hidden;
}
.match-card:hover { border-color:rgba(255,215,0,0.3); background:rgba(255,255,255,0.05); }
.match-card.blocked { opacity:0.45; }
.match-bar { position:absolute; top:0; left:0; height:3px; border-radius:0 0 3px 0; }
.card-summary { padding:16px 20px; display:flex; align-items:center; gap:16px; }

.match-rate {
  width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; flex-shrink:0;
}
.rate-high { background:rgba(107,203,119,0.15); color:#6BCB77; border:2px solid rgba(107,203,119,0.4); }
.rate-mid { background:rgba(255,193,7,0.15); color:#FFC107; border:2px solid rgba(255,193,7,0.4); }
.rate-low { background:rgba(255,107,107,0.15); color:#FF6B6B; border:2px solid rgba(255,107,107,0.4); }

.card-info h3 { font-size:14px; color:#e0e0e0; margin-bottom:3px; }
.card-meta { font-size:12px; color:#888; display:flex; flex-wrap:wrap; gap:10px; }
.card-meta .warn { color:#FF6B6B; }

.skills-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
.skill-tag { padding:2px 8px; border-radius:10px; font-size:11px; }
.skill-matched { background:rgba(107,203,119,0.12); color:#6BCB77; }

/* 详情面板 */
.detail-panel {
  display:none; padding:0 20px 16px; border-top:1px solid rgba(255,255,255,0.06);
}
.detail-panel.open { display:block; }
.detail-section { margin-top:12px; }
.detail-section h4 { font-size:12px; color:#888; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.detail-section p { font-size:13px; line-height:1.6; color:#bbb; }

.btn-action {
  display:inline-block; padding:8px 20px; border-radius:20px; font-size:13px;
  text-decoration:none; transition:all 0.2s; margin-right:8px; margin-top:10px;
}
.btn-primary { background:rgba(0,122,255,0.15); color:#4D96FF; border:1px solid rgba(0,122,255,0.3); }
.btn-primary:hover { background:rgba(0,122,255,0.3); color:#fff; }
.btn-secondary { background:rgba(255,255,255,0.05); color:#888; border:1px solid rgba(255,255,255,0.1); }
.btn-secondary:hover { background:rgba(255,255,255,0.1); color:#e0e0e0; }

.loading { text-align:center; padding:40px; color:#555; }
.ai-analysis { background:rgba(255,215,0,0.03); border:1px solid rgba(255,215,0,0.1); border-radius:8px; padding:14px; margin-top:10px; }
.ai-analysis pre { white-space:pre-wrap; font-size:12px; color:#bbb; line-height:1.6; font-family:inherit; }
</style>
</head>
<body>

<div class="main">
  <div class="header" id="header">加载中...</div>
  <div id="list"></div>
</div>

<script>
const API = window.parent?.location?.origin || location.origin;
let matchData = null;

async function load() {
  document.getElementById('header').textContent = '正在计算匹配度...';
  try {
    const resp = await fetch(`${API}/api/graph/match`);
    matchData = await resp.json();
    if (matchData.error) {
      document.getElementById('header').textContent = matchData.error;
      return;
    }
    render();
  } catch(e) {
    document.getElementById('header').textContent = '加载失败: ' + e.message;
  }
}

function render() {
  const d = matchData;
  document.getElementById('header').textContent =
    `基于简历与 ${d.matches.length} 个岗位的综合匹配（${d.user_skills.length} 项技能）`;

  document.getElementById('list').innerHTML = d.matches.map((m, i) => {
    const pct = Math.round(m.match_rate * 100);
    const cls = m.blocked?.length ? 'rate-low' : pct >= 70 ? 'rate-high' : pct >= 60 ? 'rate-mid' : 'rate-low';
    const barColor = m.blocked?.length ? '#555' : pct >= 70 ? '#6BCB77' : pct >= 60 ? '#FFC107' : '#FF6B6B';
    const warns = [
      ...(m.blocked||[]).map(b => `<span class="warn">🚫 ${b}</span>`),
      m.salary_warning ? `<span class="warn">⚠️ ${m.salary_warning}</span>` : '',
    ].filter(Boolean).join('');

    return `
      <div class="match-card ${m.blocked?.length?'blocked':''}" onclick="toggle(${i})">
        <div class="match-bar" style="width:${pct}%;background:${barColor}"></div>
        <div class="card-summary">
          <div class="match-rate ${cls}">${pct}%</div>
          <div style="flex:1">
            <div class="card-info">
              <h3>${m.name}</h3>
              <div class="card-meta">
                <span>🏢 ${m.company||'未知'}</span>
                <span>💰 ${m.salary||'面议'}</span>
                <span>📍 ${m.city||''}</span>
                ${warns}
              </div>
            </div>
            <div class="skills-row">
              ${(m.matched_skills||[]).slice(0,8).map(s=>`<span class="skill-tag skill-matched">✓ ${s}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="detail-panel" id="detail-${i}">
          <div class="detail-section">
            <h4>匹配的技能</h4>
            <div class="skills-row">
              ${(m.matched_skills||[]).map(s=>`<span class="skill-tag skill-matched">✓ ${s}</span>`).join('') || '<span style="color:#555">无精确匹配</span>'}
            </div>
          </div>
          <div class="detail-section">
            <div id="ai-${i}" class="ai-analysis" style="display:none;"></div>
            <a class="btn-action btn-secondary" onclick="event.stopPropagation();runAI(${i})">🤖 AI 深度分析</a>
            ${m.url ? `<a class="btn-action btn-primary" href="${m.url}" target="_blank" onclick="event.stopPropagation()">查看猎聘详情 →</a>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggle(i) {
  const el = document.getElementById('detail-'+i);
  el.classList.toggle('open');
}

async function runAI(i) {
  const m = matchData.matches[i];
  const el = document.getElementById('ai-'+i);
  el.style.display = 'block';
  el.innerHTML = '<pre>正在分析中...</pre>';

  try {
    const resp = await fetch(`${API}/api/test/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: `请分析这个岗位与我的匹配度：${m.name}（${m.company}，${m.salary}）。分析我的优势、差距、建议。`})
    });
    const data = await resp.json();
    el.innerHTML = `<pre>${data.reply || '分析失败'}</pre>`;
  } catch(e) {
    el.innerHTML = `<pre>分析失败: ${e.message}</pre>`;
  }
}

load();
</script>
</body>
</html>
