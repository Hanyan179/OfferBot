<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfferBot</title>
<link rel="icon" href="/public/favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
html, body { height: 100%; overflow: hidden; transition: background .2s, color .2s; }

/* ===== 浅色 ===== */
body { background: #f5f5f7; color: #1d1d1f; }
.nav { background: rgba(255,255,255,.85); border-bottom: .5px solid rgba(0,0,0,.1); }
.nav-brand { color: #1d1d1f; }
.nav-links a { color: #6e6e73; }
.nav-links a:hover { background: rgba(0,0,0,.04); color: #1d1d1f; }
.nav-links a.active { background: #007aff; color: #fff; }

/* ===== 深色 ===== */
html.dark body { background: #1a1a1a; color: #e5e5e5; }
html.dark .nav { background: rgba(30,30,30,.9); border-bottom-color: rgba(255,255,255,.08); }
html.dark .nav-brand { color: #e5e5e5; }
html.dark .nav-links a { color: #8e8e93; }
html.dark .nav-links a:hover { background: rgba(255,255,255,.06); color: #e5e5e5; }
html.dark .nav-links a.active { background: #0a84ff; color: #fff; }

/* 导航 */
.nav { backdrop-filter: saturate(180%) blur(20px); z-index: 100; }
.nav-inner { max-width: 100%; margin: 0 auto; display: flex; align-items: center; padding: 0 24px; height: 48px; gap: 24px; }
.nav-brand { font-size: 15px; font-weight: 700; text-decoration: none; white-space: nowrap; }
.nav-links { display: flex; gap: 4px; }
.nav-links a { font-size: 13px; font-weight: 500; text-decoration: none; padding: 6px 14px; border-radius: 8px; transition: all .15s; cursor: pointer; white-space: nowrap; }
.theme-toggle { margin-left: auto; cursor: pointer; font-size: 18px; line-height: 1; background: none; border: none; padding: 4px 8px; border-radius: 6px; transition: background .15s; }
.theme-toggle:hover { background: rgba(128,128,128,.1); }

/* 内容区域 */
.content-area { height: calc(100vh - 48px); position: relative; }
.tab-panel { display: none; height: 100%; overflow-y: auto; }
.tab-panel.active { display: block; }
.tab-panel iframe { width: 100%; height: 100%; border: none; }

/* ===== 对话面板布局 ===== */
.chat-layout { display: flex; height: 100%; overflow: hidden; position: relative; }
.chat-main { flex: 1; min-width: 0; height: 100%; }
.chat-main iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand">🤖 OfferBot</a>
    <div class="nav-links">
      <a data-tab="chat" class="active">💬 对话</a>
      <a data-tab="jobs">📋 岗位</a>
      <a data-tab="interviews">🎯 面试</a>
      <a data-tab="overview">🏆 总览</a>
      <a data-tab="memory">🧠 画像</a>
      <a data-tab="graph">🕸️ 图谱</a>
      <a data-tab="settings">⚙️ 设置</a>
    </div>
    <button class="theme-toggle" id="themeToggle" title="切换深浅色" style="display:none;">🌙</button>
  </div>
</nav>

<div class="content-area">
  <div id="panel-chat" class="tab-panel active">
    <div class="chat-layout" id="chatLayout">
      <!-- 对话列表侧边栏 -->
      <div class="conv-sidebar" id="convSidebar">
        <div class="conv-header">
          <span class="conv-header-title">对话记录</span>
          <button class="conv-btn" id="btnNewConv">＋ 新建</button>
        </div>
        <div class="conv-list" id="convList">
          <div class="conv-empty" id="convEmpty">暂无对话记录</div>
        </div>
      </div>
      <!-- 侧边栏切换按钮（始终可见） -->
      <button class="conv-toggle" id="convToggle" title="收起/展开对话列表">◀</button>
      <!-- Chainlit iframe -->
      <div class="chat-main">
        <iframe src="/chat" id="chatFrame"></iframe>
      </div>
      <!-- 右侧任务面板（初始不渲染，有任务时动态插入） -->
      <div class="task-panel" id="taskPanel"></div>
    </div>
    <!-- 删除确认对话框 -->
    <div class="conv-confirm-overlay" id="convConfirmOverlay">
      <div class="conv-confirm-box">
        <p>确定要删除这条对话吗？<br><small style="color:#8e8e93">删除后无法恢复</small></p>
        <div class="conv-confirm-actions">
          <button class="conv-confirm-cancel" id="btnConfirmCancel">取消</button>
          <button class="conv-confirm-delete" id="btnConfirmDelete">删除</button>
        </div>
      </div>
    </div>
  </div>
  <div id="panel-jobs" class="tab-panel"><iframe src="/page/jobs" loading="lazy"></iframe></div>
  <div id="panel-interviews" class="tab-panel"><iframe src="/page/interviews" loading="lazy"></iframe></div>
  <div id="panel-overview" class="tab-panel"><iframe src="/page/overview" loading="lazy"></iframe></div>
  <div id="panel-memory" class="tab-panel"><iframe src="/page/memory" loading="lazy"></iframe></div>
  <div id="panel-graph" class="tab-panel"><iframe src="/graph" loading="lazy"></iframe></div>
  <div id="panel-settings" class="tab-panel"><iframe src="/page/settings" loading="lazy" id="settingsFrame"></iframe></div>
</div>

<style>
/* ===== 左侧对话侧边栏 ===== */
.conv-sidebar {
  width: 260px; min-width: 260px; height: 100%;
  display: flex; flex-direction: column;
  border-right: .5px solid rgba(0,0,0,.1);
  background: rgba(255,255,255,.6);
  transition: width .25s ease, min-width .25s ease, opacity .2s;
  overflow: hidden;
}
.conv-sidebar.collapsed { width: 0; min-width: 0; opacity: 0; overflow: hidden; }
html.dark .conv-sidebar { background: rgba(30,30,30,.6); border-right-color: rgba(255,255,255,.08); }

.conv-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: .5px solid rgba(0,0,0,.06); white-space: nowrap; }
html.dark .conv-header { border-bottom-color: rgba(255,255,255,.06); }
.conv-header-title { font-size: 13px; font-weight: 600; }
.conv-btn { font-size: 12px; font-weight: 500; cursor: pointer; padding: 5px 10px; border-radius: 6px; border: none; background: #007aff; color: #fff; transition: opacity .15s; }
.conv-btn:hover { opacity: .85; }
html.dark .conv-btn { background: #0a84ff; }

/* 切换按钮 — 绝对定位，跟随侧边栏宽度 */
.conv-toggle {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 10; cursor: pointer; border: none;
  background: rgba(255,255,255,.9); border-radius: 0 6px 6px 0;
  padding: 10px 5px; font-size: 13px; line-height: 1;
  box-shadow: 2px 0 6px rgba(0,0,0,.08);
  transition: left .25s ease, background .15s;
  left: 260px;
}
.conv-toggle:hover { background: rgba(240,240,240,1); }
html.dark .conv-toggle { background: rgba(50,50,50,.95); color: #e5e5e5; }
html.dark .conv-toggle:hover { background: rgba(70,70,70,1); }
.conv-sidebar.collapsed ~ .conv-toggle { left: 0; }

.conv-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
.conv-list::-webkit-scrollbar { width: 4px; }
.conv-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 2px; }
html.dark .conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); }

.conv-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px; border-radius: 8px; cursor: pointer; transition: background .12s; position: relative; }
.conv-item:hover { background: rgba(0,0,0,.04); }
.conv-item.active { background: rgba(0,122,255,.08); }
html.dark .conv-item:hover { background: rgba(255,255,255,.05); }
html.dark .conv-item.active { background: rgba(10,132,255,.12); }
.conv-item-body { flex: 1; min-width: 0; }
.conv-item-summary { font-size: 13px; font-weight: 500; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-item-meta { font-size: 11px; color: #8e8e93; margin-top: 2px; }
.conv-item-delete { opacity: 0; border: none; background: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; color: #8e8e93; transition: opacity .12s, color .12s; flex-shrink: 0; margin-top: 1px; }
.conv-item:hover .conv-item-delete { opacity: 1; }
.conv-item-delete:hover { color: #ff3b30; }
.conv-active-dot { width: 6px; height: 6px; border-radius: 50%; background: #34c759; flex-shrink: 0; margin-top: 6px; }
.conv-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #8e8e93; font-size: 13px; }

/* 删除确认 */
.conv-confirm-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.3); align-items: center; justify-content: center; }
.conv-confirm-overlay.show { display: flex; }
.conv-confirm-box { background: #fff; border-radius: 12px; padding: 20px 24px; max-width: 320px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.15); text-align: center; }
html.dark .conv-confirm-box { background: #2c2c2e; color: #e5e5e5; }
.conv-confirm-box p { font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
.conv-confirm-actions { display: flex; gap: 10px; justify-content: center; }
.conv-confirm-actions button { flex: 1; padding: 8px 0; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
.conv-confirm-cancel { background: rgba(0,0,0,.06); color: inherit; }
.conv-confirm-cancel:hover { background: rgba(0,0,0,.1); }
html.dark .conv-confirm-cancel { background: rgba(255,255,255,.1); }
.conv-confirm-delete { background: #ff3b30; color: #fff; }
.conv-confirm-delete:hover { opacity: .85; }

/* ===== 右侧任务面板 ===== */
.task-panel {
  width: 0; min-width: 0; height: 100%;
  overflow: hidden;
  display: flex; flex-direction: column;
  border-left: none;
  background: rgba(255,255,255,.6);
  transition: width .3s ease, min-width .3s ease, border-left .3s;
}
.task-panel.visible {
  width: 300px; min-width: 300px;
  border-left: .5px solid rgba(0,0,0,.1);
}
html.dark .task-panel { background: rgba(30,30,30,.6); }
html.dark .task-panel.visible { border-left-color: rgba(255,255,255,.08); }

.task-panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px; border-bottom: .5px solid rgba(0,0,0,.06);
  white-space: nowrap;
}
html.dark .task-panel-header { border-bottom-color: rgba(255,255,255,.06); }
.task-panel-icon { font-size: 16px; }
.task-panel-title { font-size: 13px; font-weight: 600; flex: 1; }
.task-panel-badge {
  font-size: 11px; font-weight: 600; background: #007aff; color: #fff;
  padding: 1px 7px; border-radius: 10px; min-width: 18px; text-align: center;
}
html.dark .task-panel-badge { background: #0a84ff; }

.task-panel-body { flex: 1; overflow-y: auto; padding: 10px 12px; }
.task-panel-body::-webkit-scrollbar { width: 4px; }
.task-panel-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 2px; }

/* 单个任务卡片 */
.task-card {
  padding: 12px 14px; border-radius: 10px; margin-bottom: 8px;
  background: rgba(0,0,0,.03); transition: all .2s;
}
html.dark .task-card { background: rgba(255,255,255,.05); }

.task-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.task-card-icon { font-size: 15px; flex-shrink: 0; }
.task-card-name { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card-time { font-size: 11px; color: #8e8e93; flex-shrink: 0; }

.task-card-status { font-size: 12px; color: #8e8e93; margin-bottom: 8px; }
.task-card-status .status-label { font-weight: 500; }
.task-card-status .status-running { color: #007aff; }
.task-card-status .status-completed { color: #34c759; }
.task-card-status .status-failed { color: #ff3b30; }
html.dark .task-card-status .status-running { color: #0a84ff; }

/* 进度条 */
.task-bar { height: 4px; border-radius: 2px; background: rgba(0,0,0,.06); overflow: hidden; }
html.dark .task-bar { background: rgba(255,255,255,.08); }
.task-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
.task-bar-fill.running { background: linear-gradient(90deg, #007aff, #5ac8fa); animation: barPulse 2s ease-in-out infinite; }
.task-bar-fill.completed { background: #34c759; }
.task-bar-fill.failed, .task-bar-fill.timeout { background: #ff3b30; }
html.dark .task-bar-fill.running { background: linear-gradient(90deg, #0a84ff, #64d2ff); }

@keyframes barPulse {
  0% { opacity: 1; }
  50% { opacity: .6; }
  100% { opacity: 1; }
}

.task-card-detail { font-size: 11px; color: #8e8e93; margin-top: 6px; line-height: 1.4; }
</style>

<script>
// ===== 标签页切换 =====
function switchToTab(tabName) {
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const link = document.querySelector('.nav-links a[data-tab="' + tabName + '"]');
  if (link) link.classList.add('active');
  const panel = document.getElementById('panel-' + tabName);
  if (panel) panel.classList.add('active');
  if (tabName === 'chat') loadConversations();
}
document.querySelectorAll('.nav-links a[data-tab]').forEach(link => {
  link.addEventListener('click', () => switchToTab(link.dataset.tab));
});

// ===== 深浅色主题 =====
function applyNavTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  document.querySelectorAll('.tab-panel:not(#panel-chat) iframe').forEach(iframe => {
    try { iframe.contentWindow.postMessage({ type: 'themeChange', dark }, '*'); } catch(e) {}
  });
}
let lastTheme = localStorage.getItem('colorMode') || 'light';
applyNavTheme(lastTheme === 'dark');
setInterval(() => {
  const current = localStorage.getItem('colorMode') || 'light';
  if (current !== lastTheme) { lastTheme = current; applyNavTheme(current === 'dark'); }
}, 500);
window.addEventListener('message', (e) => {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'switchTab') switchToTab(e.data.tab);
  if (e.data.type === 'settingsSaved') { switchToTab('chat'); document.getElementById('chatFrame').src = '/chat?t=' + Date.now(); }
  if (e.data.type === 'chainlitThemeChange') applyNavTheme(e.data.dark);
});

// ===== 对话列表管理 =====
let _convActiveId = null;
let _convDeleteTarget = null;
const convSidebar = document.getElementById('convSidebar');
const convToggle = document.getElementById('convToggle');
const convList = document.getElementById('convList');
const convEmpty = document.getElementById('convEmpty');
const btnNewConv = document.getElementById('btnNewConv');
const confirmOverlay = document.getElementById('convConfirmOverlay');
const btnConfirmCancel = document.getElementById('btnConfirmCancel');
const btnConfirmDelete = document.getElementById('btnConfirmDelete');

// 侧边栏折叠 — 修复：用 class 控制，toggle 按钮始终可点击
convToggle.addEventListener('click', () => {
  const isCollapsed = convSidebar.classList.toggle('collapsed');
  convToggle.textContent = isCollapsed ? '▶' : '◀';
});

async function loadConversations() {
  try {
    const res = await fetch('/api/conversations');
    const data = await res.json();
    renderConversations(data.conversations || []);
  } catch (e) { console.error('加载对话列表失败:', e); }
}

function renderConversations(convs) {
  convList.querySelectorAll('.conv-item').forEach(el => el.remove());
  if (!convs.length) { convEmpty.style.display = 'flex'; return; }
  convEmpty.style.display = 'none';
  const activeConv = convs.find(c => c.is_active);
  if (activeConv) _convActiveId = activeConv.id;
  convs.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.is_active ? ' active' : '');
    item.dataset.id = conv.id;
    item.innerHTML =
      (conv.is_active ? '<div class="conv-active-dot"></div>' : '') +
      '<div class="conv-item-body"><div class="conv-item-summary">' + escapeHtml(conv.summary || '新对话') + '</div>' +
      '<div class="conv-item-meta">' + escapeHtml(formatConvTime(conv.created_at)) +
      (conv.message_count ? ' · ' + conv.message_count + '条' : '') + '</div></div>' +
      '<button class="conv-item-delete" title="删除对话">✕</button>';
    item.addEventListener('click', (e) => { if (!e.target.closest('.conv-item-delete')) switchConversation(conv.id); });
    item.querySelector('.conv-item-delete').addEventListener('click', (e) => { e.stopPropagation(); showDeleteConfirm(conv.id); });
    convList.appendChild(item);
  });
}

async function switchConversation(convId) {
  if (convId === _convActiveId) return;
  await fetch('/api/conversations/' + encodeURIComponent(convId) + '/active', { method: 'PUT' });
  document.getElementById('chatFrame').src = '/chat?t=' + Date.now();
  _convActiveId = convId;
  convList.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === convId);
    const dot = el.querySelector('.conv-active-dot');
    if (el.dataset.id === convId && !dot) { const d = document.createElement('div'); d.className = 'conv-active-dot'; el.insertBefore(d, el.firstChild); }
    else if (el.dataset.id !== convId && dot) dot.remove();
  });
}

btnNewConv.addEventListener('click', async () => {
  btnNewConv.disabled = true;
  try {
    const res = await fetch('/api/conversations', { method: 'POST' });
    const data = await res.json();
    if (data.id) { document.getElementById('chatFrame').src = '/chat?t=' + Date.now(); _convActiveId = data.id; await loadConversations(); }
  } catch (e) { console.error('创建对话失败:', e); }
  finally { btnNewConv.disabled = false; }
});

function showDeleteConfirm(convId) { _convDeleteTarget = convId; confirmOverlay.classList.add('show'); }
btnConfirmCancel.addEventListener('click', () => { _convDeleteTarget = null; confirmOverlay.classList.remove('show'); });
confirmOverlay.addEventListener('click', (e) => { if (e.target === confirmOverlay) { _convDeleteTarget = null; confirmOverlay.classList.remove('show'); } });
btnConfirmDelete.addEventListener('click', async () => {
  if (!_convDeleteTarget) return;
  const convId = _convDeleteTarget;
  btnConfirmDelete.disabled = true;
  try {
    const res = await fetch('/api/conversations/' + encodeURIComponent(convId), { method: 'DELETE' });
    if ((await res.json()).ok) { if (convId === _convActiveId) document.getElementById('chatFrame').src = '/chat?t=' + Date.now(); await loadConversations(); }
  } catch (e) { console.error('删除对话失败:', e); }
  finally { _convDeleteTarget = null; confirmOverlay.classList.remove('show'); btnConfirmDelete.disabled = false; }
});

function formatConvTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts.replace(' ', 'T')), diff = Date.now() - d, days = Math.floor(diff / 86400000);
    if (days === 0) return '今天 ' + d.toTimeString().slice(0, 5);
    if (days === 1) return '昨天';
    if (days < 7) return days + '天前';
    return (d.getMonth() + 1) + '/' + d.getDate();
  } catch (e) { return ts; }
}
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

loadConversations();

// ===== 任务面板 =====
const taskPanel = document.getElementById('taskPanel');
let _taskPanelVisible = false;
let _hideTimer = null;

function showTaskPanel() {
  if (_taskPanelVisible) return;
  _taskPanelVisible = true;
  if (_hideTimer) { clearTimeout(_hideTimer); _hideTimer = null; }
  // 渲染面板内容
  taskPanel.innerHTML =
    '<div class="task-panel-header">' +
      '<span class="task-panel-icon">📋</span>' +
      '<span class="task-panel-title">任务进度</span>' +
      '<span class="task-panel-badge" id="taskBadge">0</span>' +
    '</div>' +
    '<div class="task-panel-body" id="taskBody"></div>';
  taskPanel.classList.add('visible');
}

function hideTaskPanel() {
  if (!_taskPanelVisible) return;
  // 延迟 8 秒后隐藏（让用户看到完成状态）
  if (_hideTimer) clearTimeout(_hideTimer);
  _hideTimer = setTimeout(() => {
    _taskPanelVisible = false;
    taskPanel.classList.remove('visible');
    setTimeout(() => { taskPanel.innerHTML = ''; }, 300); // 动画结束后清空
    _hideTimer = null;
  }, 8000);
}

function renderTaskCards(tasks) {
  const body = document.getElementById('taskBody');
  if (!body) return;
  body.innerHTML = '';

  const badge = document.getElementById('taskBadge');
  const runningCount = tasks.filter(t => t.status === 'running' || t.status === 'pending').length;
  if (badge) badge.textContent = runningCount || tasks.length;

  tasks.forEach(t => {
    const icon = { running: '⏳', completed: '✅', failed: '❌', timeout: '⏰', pending: '🔄' }[t.status] || '❓';
    const label = { running: '运行中', completed: '已完成', failed: '失败', timeout: '超时', pending: '等待中' }[t.status] || t.status;
    const statusClass = 'status-' + t.status;
    const elapsed = t.elapsed_s || 0;
    const timeStr = elapsed >= 60 ? Math.floor(elapsed / 60) + '分' + (elapsed % 60) + '秒' : elapsed + '秒';
    // 进度条宽度：running 用动态值，其他用固定
    let barWidth = '0%';
    if (t.status === 'running') barWidth = Math.min(90, 20 + elapsed) + '%';
    else if (t.status === 'completed') barWidth = '100%';
    else if (t.status === 'failed' || t.status === 'timeout') barWidth = '100%';

    const card = document.createElement('div');
    card.className = 'task-card';
    card.innerHTML =
      '<div class="task-card-top">' +
        '<span class="task-card-icon">' + icon + '</span>' +
        '<span class="task-card-name">' + escapeHtml(t.name) + '</span>' +
        '<span class="task-card-time">' + timeStr + '</span>' +
      '</div>' +
      '<div class="task-card-status"><span class="status-label ' + statusClass + '">' + label + '</span></div>' +
      '<div class="task-bar"><div class="task-bar-fill ' + t.status + '" style="width:' + barWidth + '"></div></div>' +
      (t.progress_text ? '<div class="task-card-detail">' + escapeHtml(t.progress_text) + '</div>' : '');
    body.appendChild(card);
  });
}

async function pollTasks() {
  try {
    const res = await fetch('/api/tasks');
    const data = await res.json();
    const tasks = data.tasks || [];

    if (tasks.length > 0) {
      showTaskPanel();
      renderTaskCards(tasks);
      // 如果全部完成，启动延迟隐藏
      const allDone = tasks.every(t => t.status !== 'running' && t.status !== 'pending');
      if (allDone) hideTaskPanel();
    } else if (_taskPanelVisible) {
      hideTaskPanel();
    }
  } catch (e) { /* 静默 */ }
}

setInterval(pollTasks, 2000);
pollTasks();
</script>
</body>
</html>
