{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <h1>🏆 求职总览</h1>
  <p>全局把控求职进度。</p>
</div>

<div class="stat-grid">
  <div class="stat-card"><div class="stat-num">{{ stats.active }}</div><div class="stat-label">进行中</div></div>
  <div class="stat-card"><div class="stat-num">{{ stats.new_this_week }}</div><div class="stat-label">本周新增</div></div>
  <div class="stat-card"><div class="stat-num">{{ stats.interviews }}</div><div class="stat-label">面试</div></div>
  <div class="stat-card"><div class="stat-num">{{ stats.offers }}</div><div class="stat-label">Offer</div></div>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;">
  {% for card in cards %}
  <div class="card" style="border-left:3px solid {% if card.color == 'green' %}#22c55e{% elif card.color == 'yellow' %}#eab308{% else %}#ef4444{% endif %};">
    <div style="font-size:14px;font-weight:600;">{{ card.title }}</div>
    <div style="font-size:12px;color:#86868b;margin:2px 0;">{{ card.company }}</div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;">
      <span class="badge badge-blue">匹配 {{ card.score }}</span>
      <span style="font-size:11px;color:#6e6e73;">{{ card.stage }}</span>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
