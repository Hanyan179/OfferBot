<div class="page-header">
  <h1>🎯 面试追踪</h1>
  <p>追踪每个岗位的面试进展。</p>
</div>
<div class="stat-grid">
  {% for stage in funnel %}
  <div class="stat-card"><div class="stat-num">{{ stage.count }}</div><div class="stat-label">{{ stage.name }}</div></div>
  {% endfor %}
</div>
<div class="card" style="padding:0;overflow:hidden;">
  <table>
    <thead><tr><th>岗位</th><th>公司</th><th>阶段</th><th>更新时间</th></tr></thead>
    <tbody>
    {% for item in interviews %}
    <tr>
      <td><strong>{{ item.title }}</strong></td>
      <td>{{ item.company }}</td>
      <td><span class="badge {% if item.stage == 'offer' %}badge-green{% elif item.stage == 'rejected' %}badge-red{% else %}badge-yellow{% endif %}">{{ item.stage_label }}</span></td>
      <td style="color:#86868b;">{{ item.updated }}</td>
    </tr>
    {% endfor %}
    {% if not interviews %}<tr><td colspan="4" class="empty">暂无面试数据</td></tr>{% endif %}
    </tbody>
  </table>
</div>
