<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} — Boss Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
body { background: #f5f5f7; color: #1d1d1f; min-height: 100vh; }

/* 导航 */
.nav { background: rgba(255,255,255,.85); backdrop-filter: saturate(180%) blur(20px); border-bottom: .5px solid rgba(0,0,0,.1); position: sticky; top: 0; z-index: 100; }
.nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; padding: 0 24px; height: 48px; gap: 32px; }
.nav-brand { font-size: 15px; font-weight: 700; color: #1d1d1f; text-decoration: none; }
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  font-size: 13px; font-weight: 500; color: #6e6e73; text-decoration: none;
  padding: 6px 14px; border-radius: 8px; transition: all .15s;
}
.nav-links a:hover { background: rgba(0,0,0,.04); color: #1d1d1f; }
.nav-links a.active { background: #007aff; color: #fff; }

/* 主体 */
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* 页头 */
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; }
.page-header p { font-size: 14px; color: #86868b; margin-top: 4px; }

/* 卡片 */
.card { background: #fff; border-radius: 14px; border: 1px solid rgba(0,0,0,.04); padding: 20px; margin-bottom: 16px; }

/* 表格 */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; color: #6b7280; font-weight: 500; background: #f9fafb; font-size: 12px; }
td { padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,.04); }
tr:hover td { background: #fafafa; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; text-decoration: none; }
.btn-primary { background: #007aff; color: #fff; }
.btn-primary:hover { background: #0056d6; }
.btn-secondary { background: #f0f0f0; color: #1d1d1f; }
.btn-secondary:hover { background: #e5e5e5; }
.btn-danger { background: #ff3b30; color: #fff; }
.btn-danger:hover { background: #d63028; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* 表单 */
input[type="text"], input[type="number"], input[type="url"], textarea, select {
  width: 100%; padding: 10px 14px; border: 1px solid rgba(0,0,0,.1); border-radius: 10px;
  font-size: 14px; background: #fafafa; transition: border-color .2s;
}
input:focus, textarea:focus, select:focus { border-color: rgba(0,122,255,.5); outline: none; box-shadow: 0 0 0 3px rgba(0,122,255,.1); }
label { font-size: 13px; font-weight: 500; color: #1d1d1f; display: block; margin-bottom: 4px; }
.form-group { margin-bottom: 16px; }

/* 徽章 */
.badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-blue { background: #dbeafe; color: #1e40af; }

/* 空状态 */
.empty { text-align: center; padding: 48px 0; color: #86868b; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* 工具栏 */
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
.toolbar-right { display: flex; gap: 8px; }

/* 统计卡片 */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: 14px; padding: 16px; text-align: center; border: 1px solid rgba(0,0,0,.04); }
.stat-num { font-size: 28px; font-weight: 700; letter-spacing: -.03em; }
.stat-label { font-size: 12px; color: #86868b; margin-top: 2px; }

/* 模态框 */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">🤖 Boss Agent</a>
    <div class="nav-links">
      <a href="/chat" {% if active == 'chat' %}class="active"{% endif %}>💬 对话</a>
      <a href="/jobs" {% if active == 'jobs' %}class="active"{% endif %}>📋 岗位</a>
      <a href="/resume" {% if active == 'resume' %}class="active"{% endif %}>📄 简历</a>
      <a href="/autopilot" {% if active == 'autopilot' %}class="active"{% endif %}>🚀 一键求职</a>
      <a href="/settings" {% if active == 'settings' %}class="active"{% endif %}>⚙️ 设置</a>
    </div>
  </div>
</nav>
<div class="main">
{% block content %}{% endblock %}
</div>
{% block extra_scripts %}{% endblock %}
</body>
</html>
